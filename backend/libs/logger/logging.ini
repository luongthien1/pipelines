[loggers]
keys=root, app

[logger_root]
level=DEBUG
handlers=consoleHandler

[handlers]
keys=consoleHandler

[logger_app]
level = DEBUG
handlers = consoleHandler
qualname = app
propagate = 0

[logger_uvicorn_access]
level = WARNING
handlers = console
qualname = uvicorn.access
propagate = 0

[logger_h11]
level = WARNING
handlers = console
qualname = h11_impl
propagate = 0

[formatters]
keys=detailedFormatter

[handler_consoleHandler]
class=StreamHandler
formatter=detailedFormatter
args=(sys.stdout,)

[formatter_detailedFormatter]
format = %(asctime)s %(levelname)s [%(module)s][%(funcName)s:%(lineno)d] %(message)s
